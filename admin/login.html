<!doctype html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log Masuk Admin — JPNJ</title>
  <script type="module" crossorigin src="/assets/main-BL0iAgfi.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/main-DfQhBBYq.css">
</head>
<body class="bg-surface min-h-screen flex items-center justify-center p-4"
  x-data="{
    email: '',
    password: '',
    showPassword: false,
    loading: false,
    error: '',
    login() {
      this.error = '';
      if (!this.email || !this.password) {
        this.error = 'Sila masukkan e-mel dan kata laluan.';
        return;
      }
      this.loading = true;
      setTimeout(() => {
        if (this.email === 'admin@jpnj.gov.my' && this.password === 'admin123') {
          window.location.href = 'index.html';
        } else {
          this.loading = false;
          this.error = 'E-mel atau kata laluan tidak sah. Sila cuba semula.';
        }
      }, 1200);
    }
  }">

  <!-- Background pattern -->
  <div class="fixed inset-0 bg-primary-dark overflow-hidden -z-10">
    <div class="absolute inset-0" style="background: linear-gradient(135deg, #0f2410 0%, #1a3d1a 40%, #2d6a2d 100%)"></div>
    <div class="absolute top-0 right-0 w-96 h-96 bg-white/5 rounded-full -translate-y-1/2 translate-x-1/2"></div>
    <div class="absolute bottom-0 left-0 w-80 h-80 bg-white/5 rounded-full translate-y-1/2 -translate-x-1/2"></div>
    <div class="absolute top-1/2 left-1/4 w-48 h-48 bg-accent/10 rounded-full"></div>
  </div>

  <div class="w-full max-w-md">

    <!-- Logo Header -->
    <div class="text-center mb-8">
      <img src="/assets/logo-Clln_BRm.svg" alt="Jabatan Perhutanan Negeri Johor" class="h-12 w-auto mx-auto mb-3">
      <p class="text-white/55 text-sm">Portal Admin</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">

      <!-- Card Header -->
      <div class="px-8 pt-8 pb-6 border-b border-gray-100">
        <h2 class="text-lg font-bold text-text font-heading">Log Masuk</h2>
        <p class="text-sm text-gray-400 mt-0.5">Masukkan kelayakan anda untuk meneruskan</p>
      </div>

      <!-- Form -->
      <form class="px-8 py-6 space-y-5" @submit.prevent="login()">

        <!-- Error Alert -->
        <div x-show="error" x-transition class="flex items-start gap-3 bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm">
          <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0 mt-0.5"></i>
          <span x-text="error"></span>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">E-mel</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
              <i data-lucide="mail" class="w-4 h-4 text-gray-400"></i>
            </div>
            <input
              type="email"
              x-model="email"
              placeholder="pegawai@jpnj.gov.my"
              class="w-full pl-10 pr-4 py-2.5 border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition"
              :class="error ? 'border-red-300' : ''"
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide">Kata Laluan</label>
            <a href="#" class="text-xs text-primary hover:text-primary-dark font-medium transition">Lupa kata laluan?</a>
          </div>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
              <i data-lucide="lock" class="w-4 h-4 text-gray-400"></i>
            </div>
            <input
              :type="showPassword ? 'text' : 'password'"
              x-model="password"
              placeholder="••••••••"
              class="w-full pl-10 pr-10 py-2.5 border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition"
              :class="error ? 'border-red-300' : ''"
            />
            <button type="button" @click="showPassword = !showPassword" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-gray-400 hover:text-gray-600 transition">
              <i data-lucide="eye" class="w-4 h-4" x-show="!showPassword"></i>
              <i data-lucide="eye-off" class="w-4 h-4" x-show="showPassword" style="display:none"></i>
            </button>
          </div>
        </div>

        <!-- Remember Me -->
        <div class="flex items-center gap-2">
          <input type="checkbox" id="remember" class="w-4 h-4 rounded border-border text-primary focus:ring-primary accent-primary">
          <label for="remember" class="text-sm text-gray-600">Ingat saya selama 30 hari</label>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full bg-primary hover:bg-primary-light text-white py-2.5 rounded-lg text-sm font-semibold transition flex items-center justify-center gap-2"
          :disabled="loading"
          :class="loading ? 'opacity-75 cursor-not-allowed' : ''"
        >
          <svg x-show="loading" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
          </svg>
          <i data-lucide="log-in" class="w-4 h-4" x-show="!loading"></i>
          <span x-text="loading ? 'Mengesahkan...' : 'Log Masuk'"></span>
        </button>

      </form>

      <!-- Demo Credentials -->
      <div class="px-8 pb-6">
        <div class="bg-blue-50 border border-blue-100 rounded-lg px-4 py-3">
          <p class="text-xs font-semibold text-blue-700 mb-1.5 flex items-center gap-1.5">
            <i data-lucide="info" class="w-3.5 h-3.5"></i>
            Akaun Demo
          </p>
          <div class="space-y-0.5 text-xs text-blue-600 font-mono">
            <p>E-mel: <span class="font-semibold">admin@jpnj.gov.my</span></p>
            <p>Kata Laluan: <span class="font-semibold">admin123</span></p>
          </div>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <div class="text-center mt-6 space-y-2">
      <a href="../index.html" class="inline-flex items-center gap-1.5 text-white/60 hover:text-white text-sm transition">
        <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i>
        Kembali ke portal awam
      </a>
      <p class="text-white/30 text-xs">© 2024 Jabatan Perhutanan Negeri Johor. Hak cipta terpelihara.</p>
    </div>

  </div>

</body>
</html>
